spring.application.name=post-api

# Server
server.port=8080

# Database - H2 in-memory (for dev); switch to PostgreSQL for production
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# ddl-auto=none: Hibernate must NOT touch the schema in production.
# Schema management is owned by SchemaInitializer (CommandLineRunner)
# which runs schema-postgres.sql + data.sql on first boot. Running
# create-drop here is dangerous: it would (a) drop prod data whenever
# the app starts, and (b) race with parallel @SpringBootTest runs in
# CI which share the same testdb — the test's create-drop would wipe
# the prod app's `posts` table mid-flight and break E2E tests.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Spring Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Scheduling
spring.task.scheduling.pool.size=1
