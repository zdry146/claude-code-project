spring.application.name=post-api-test

# Database - PostgreSQL for integration testing
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate - Use create-drop for test isolation, validate schema
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Batch Settings for performance testing
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=true

# Spring Batch - create schema for tests
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# SQL Init - embedded mode for test
spring.sql.init.mode=never

# Disable schema creation check (Hibernate handles it)
spring.jpa.defer-datasource-initialization=false