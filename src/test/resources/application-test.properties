spring.application.name=post-api-test

# Enable test data seeder for @SpringBootTest unit/integration tests.
# Production deployments don't set this (see TestDataSeeder's
# @ConditionalOnProperty) so the prod `posts` table is never seeded
# with synthetic rows on startup.
test-data.seeder.enabled=true

# Database - PostgreSQL for integration testing
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate - ddl-auto=none so tests don't fight SchemaInitializer
# (or each other) for the same testdb schema. SchemaInitializer owns
# DDL on first boot; subsequent test runs no-op (table exists). This
# also means we no longer race the prod app: both endpoints agree on
# "posts exists, skip the script".
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Batch Settings for performance testing
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=true

# Spring Batch - create schema for tests
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# SQL Init - embedded mode for test
spring.sql.init.mode=never

# Disable schema creation check (Hibernate handles it)
spring.jpa.defer-datasource-initialization=false